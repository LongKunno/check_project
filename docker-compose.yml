services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: auditor_v2
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./main.py:/app/main.py
      - ./reports:/app/reports
      - ./.env:/app/.env
      - ./tests:/app/tests
    environment:
      - PYTHONUNBUFFERED=1
      - MAX_MULTIPART_FILES=100000
      - MAX_MULTIPART_FIELDS=100000
      - UVICORN_TIMEOUT_KEEP_ALIVE=600
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/auditor_v2
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - ALLOWED_EMAILS=${ALLOWED_EMAILS}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    depends_on:
      - db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Không dùng --reload để tránh restart khi đang chạy test
    command: uvicorn src.api.api_server:app --host 0.0.0.0 --port 8000 --timeout-keep-alive 600

  frontend:
    image: node:20-slim
    working_dir: /app
    ports:
      - "3000:5173"
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    environment:
      - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - VITE_APP_VERSION=${APP_VERSION}
    # Vite HMR: cập nhật trình duyệt ngay khi sửa JSX/CSS, không cần rebuild
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - backend

  docs:
    image: squidfunk/mkdocs-material
    ports:
      - "8001:8000"
    volumes:
      - ./docs:/docs/docs
      - ./mkdocs.yml:/docs/mkdocs.yml
    # Phù hợp với development, tự động reload khi sửa file .md
    command: serve -a 0.0.0.0:8000 -f /docs/mkdocs.yml

volumes:
  pgdata:
