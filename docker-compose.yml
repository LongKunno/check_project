services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./main.py:/app/main.py
      - ./reports:/app/reports
      - ./.env:/app/.env
    environment:
      - PYTHONUNBUFFERED=1
      - MAX_MULTIPART_FILES=100000
      - MAX_MULTIPART_FIELDS=100000
      - UVICORN_TIMEOUT_KEEP_ALIVE=600
    # --reload: tự restart khi sửa code Python, không cần rebuild
    command: uvicorn src.api.api_server:app --host 0.0.0.0 --port 8000 --reload --timeout-keep-alive 600

  frontend:
    image: node:20-slim
    working_dir: /app
    ports:
      - "3000:5173"
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    # Vite HMR: cập nhật trình duyệt ngay khi sửa JSX/CSS, không cần rebuild
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - backend
