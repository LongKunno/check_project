site_name: AI Static Analysis Documentation
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables

nav:
  - Trang chủ: index.md
  - Tính năng Hệ thống:
      - Code Discovery: features/discovery.md
      - Core Audit Engine: features/core_auditor_engine.md
      - Real-time Streaming: features/real_time_audit.md
      - Scoring System: features/scoring.md
      - Interactive Dashboard: features/dashboard.md
      - Natural Language Rules (NLRE): features/nlre.md
      - High-Performance UI: features/ui_performance.md
      - UI Text Selection Fix: features/ui_text_selection.md
      - Member Overview: features/member_overview.md
      - UI Language (English): features/ui_language_english.md
  - Kiến trúc hệ thống:
    - Tổng quan: architecture/overview.md
    - Kiến trúc Module: architecture/module_architecture.md
    - Quyết định thiết kế (ADR): architecture/design_decisions.md
    - NLRE Engine: architecture/nlre_engine.md
    - Docker Setup: architecture/docker_setup.md
  
  - Database:
    - Tổng quan: database/overview.md
    - Lịch sử kiểm toán: database/audit_history.md
    
  - API Specifications:
    - Real-time Stream: api_specs/stream.md
    - Background Jobs (V6): api_specs/audit_jobs.md
    - Upload Project: api_specs/upload.md
    - Health Checks: api_specs/ai_health.md
    - Fix Suggestion: api_specs/fix_suggestion.md
    - History Retrieval: api_specs/history.md
    - Repositories & Scores: api_specs/repositories.md
    - Git Configuration: api_specs/git.md
    - Rules Compiler: api_specs/rules.md
    - Members & Leaderboard: api_specs/members.md

  - Quy chuẩn Tech Stack:
      - Python Rules: tech_stack/python_rules.md
      - Frontend Rules: tech_stack/frontend_rules.md
      - Tùy chỉnh Quy tắc: tech_stack/rule_customization.md

  - Kiểm thử (Quality Assurance):
      - Test Cases Chi tiết: tests/detailed_test_cases.md
