site_name: AI Static Analysis Documentation
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables

nav:
  - Trang chủ: index.md
  - Tính năng Hệ thống:
      - Code Discovery: features/discovery.md
      - Analysis Auditor: features/auditor.md
      - AI-Assisted Review: features/ai_review.md
      - Real-time Streaming: features/real_time_audit.md
      - Scoring System: features/scoring.md
      - Interactive Dashboard: features/dashboard.md
  - Kiến trúc hệ thống:
      - Tổng quan: architecture/overview.md
      - Docker & Deployment: architecture/docker_setup.md
      - Quyết định Thiết kế (ADR): architecture/design_decisions.md
  - API Specifications:
      - Upload File: api_specs/upload.md
      - Git Audit: api_specs/git.md
      - Audit History: api_specs/history.md
      - SSE Stream: api_specs/stream.md
  - Database Schema:
      - Overview: database/overview.md
      - Audit History Table: database/audit_history.md
  - Quy chuẩn Tech Stack:
      - Python Rules: tech_stack/python_rules.md
      - Frontend Rules: tech_stack/frontend_rules.md
      - Tùy chỉnh Quy tắc: tech_stack/rule_customization.md
